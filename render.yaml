services:
  - type: web
    name: fire-ledger
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fire-ledger-db
          property: connectionString

  - type: postgres
    name: fire-ledger-db
    plan: free
    version: 16
